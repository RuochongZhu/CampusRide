name: CampusRide CI

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/ci-cd-test.yml'
      - 'integration-local-localhost/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-cd-test.yml'
      - 'integration-local-localhost/**'

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./integration-local-localhost

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./integration-local-localhost/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./integration-local-localhost/campusride-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./integration-local-localhost/campusride-backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend unit tests
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test_anon_key
          SUPABASE_SERVICE_KEY: test_service_key
          RESEND_API_KEY: re_test_key
        run: npm test -- --runInBand
