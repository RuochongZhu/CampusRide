<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#555"/></marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="#555"/></marker>
    <marker id="arrowBi" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#555"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="920" fill="#FAFAF7" rx="4"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1400" height="36" fill="#D4A843" rx="4"/>
  <rect x="0" y="20" width="1400" height="16" fill="#D4A843"/>
  <text x="20" y="24" font-size="14" font-weight="600" fill="#fff">ibd [Block] Website: CampusGo [ Website: CampusGo ]</text>

  <!-- ==================== EXTERNAL ACTORS (Left) ==================== -->

  <!-- Cornell Student -->
  <rect x="30" y="100" width="180" height="44" rx="4" fill="#FFF8DC" stroke="#C8A84E" stroke-width="1.5"/>
  <text x="120" y="127" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Cornell Student</text>
  <text x="120" y="155" text-anchor="middle" font-size="9" fill="#888">(Passenger / Driver / Seller / Buyer)</text>

  <!-- WeChat User -->
  <rect x="30" y="220" width="180" height="44" rx="4" fill="#FFF8DC" stroke="#C8A84E" stroke-width="1.5"/>
  <text x="120" y="247" text-anchor="middle" font-size="13" font-weight="600" fill="#333">WeChat Mini Program User</text>

  <!-- Platform Admin -->
  <rect x="30" y="740" width="180" height="44" rx="4" fill="#FFF0E0" stroke="#D4874E" stroke-width="1.5"/>
  <text x="120" y="767" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Platform Administrator</text>

  <!-- ==================== SYSTEM BOUNDARY ==================== -->
  <rect x="280" y="60" width="620" height="830" rx="8" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="12,6"/>
  <text x="590" y="84" text-anchor="middle" font-size="15" font-weight="700" fill="#555">CampusGo Platform</text>

  <!-- ======= Frontend Block ======= -->
  <rect x="310" y="105" width="260" height="200" rx="6" fill="#FFFBE6" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="105" width="260" height="28" rx="6" fill="#F5E6A3" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="125" width="260" height="8" fill="#FFFBE6" stroke="none"/>
  <text x="440" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#555">Frontend (Vue.js + Vite)</text>
  <text x="320" y="152" font-size="10" fill="#666">Hosted on: Vercel</text>
  <text x="320" y="170" font-size="10" fill="#666">Features:</text>
  <text x="330" y="185" font-size="9.5" fill="#777">- Rideshare / Carpooling</text>
  <text x="330" y="198" font-size="9.5" fill="#777">- Marketplace (Buy/Sell)</text>
  <text x="330" y="211" font-size="9.5" fill="#777">- Activities / Check-in</text>
  <text x="330" y="224" font-size="9.5" fill="#777">- Messages / Groups</text>
  <text x="330" y="237" font-size="9.5" fill="#777">- Leaderboard / Points</text>
  <text x="330" y="250" font-size="9.5" fill="#777">- Friends / Thoughts</text>
  <text x="330" y="263" font-size="9.5" fill="#777">- User Profile / Ratings</text>
  <text x="330" y="276" font-size="9.5" fill="#777">- Admin Panel</text>

  <!-- ======= Backend API Block ======= -->
  <rect x="310" y="340" width="260" height="195" rx="6" fill="#FFFBE6" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="340" width="260" height="28" rx="6" fill="#F5E6A3" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="360" width="260" height="8" fill="#FFFBE6" stroke="none"/>
  <text x="440" y="359" text-anchor="middle" font-size="12" font-weight="700" fill="#555">Backend API (Node.js / Express)</text>
  <text x="320" y="387" font-size="10" fill="#666">Hosted on: Railway</text>
  <text x="320" y="405" font-size="10" fill="#666">API Modules (23 routes):</text>
  <text x="330" y="420" font-size="9.5" fill="#777">- Auth (email + WeChat + guest)</text>
  <text x="330" y="433" font-size="9.5" fill="#777">- Rideshare / Carpooling CRUD</text>
  <text x="330" y="446" font-size="9.5" fill="#777">- Marketplace CRUD + Comments</text>
  <text x="330" y="459" font-size="9.5" fill="#777">- Activities / Check-in / Chat</text>
  <text x="330" y="472" font-size="9.5" fill="#777">- Messages / Notifications</text>
  <text x="330" y="485" font-size="9.5" fill="#777">- Groups / Friends / Thoughts</text>
  <text x="330" y="498" font-size="9.5" fill="#777">- Points / Leaderboard / Ratings</text>
  <text x="330" y="511" font-size="9.5" fill="#777">- Upload / Admin / Webhooks</text>

  <!-- ======= Socket.IO Block ======= -->
  <rect x="310" y="570" width="260" height="100" rx="6" fill="#FFFBE6" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="570" width="260" height="28" rx="6" fill="#F5E6A3" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="590" width="260" height="8" fill="#FFFBE6" stroke="none"/>
  <text x="440" y="589" text-anchor="middle" font-size="12" font-weight="700" fill="#555">Real-time Engine (Socket.IO)</text>
  <text x="320" y="617" font-size="10" fill="#666">WebSocket with JWT auth</text>
  <text x="320" y="635" font-size="9.5" fill="#777">- Live chat / typing indicators</text>
  <text x="320" y="648" font-size="9.5" fill="#777">- Push notifications / ride updates</text>
  <text x="320" y="661" font-size="9.5" fill="#777">- Activity feed real-time sync</text>

  <!-- ======= Auth Module Block ======= -->
  <rect x="310" y="705" width="260" height="80" rx="6" fill="#FFFBE6" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="705" width="260" height="28" rx="6" fill="#F5E6A3" stroke="#C8A84E" stroke-width="1.5"/>
  <rect x="310" y="725" width="260" height="8" fill="#FFFBE6" stroke="none"/>
  <text x="440" y="724" text-anchor="middle" font-size="12" font-weight="700" fill="#555">Auth Service</text>
  <text x="320" y="752" font-size="9.5" fill="#777">- Email verification (cornell.edu)</text>
  <text x="320" y="765" font-size="9.5" fill="#777">- JWT tokens (7d access / 30d refresh)</text>
  <text x="320" y="778" font-size="9.5" fill="#777">- WeChat openid linkage / Guest mode</text>

  <!-- ======= Internal connections ======= -->
  <!-- Frontend ↔ Backend -->
  <line x1="440" y1="305" x2="440" y2="340" stroke="#888" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="448" y="326" font-size="9" fill="#888">REST API /api/v1/*</text>

  <!-- Frontend ↔ Socket.IO -->
  <line x1="370" y1="305" x2="370" y2="570" stroke="#6B8E9B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <text x="310" y="440" font-size="9" fill="#6B8E9B" transform="rotate(-90,310,440)">WebSocket</text>

  <!-- Backend → Socket.IO -->
  <line x1="500" y1="535" x2="500" y2="570" stroke="#888" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <text x="508" y="555" font-size="9" fill="#888">events</text>

  <!-- Backend ↔ Auth -->
  <line x1="440" y1="535" x2="440" y2="705" stroke="#888" stroke-width="1.2" marker-end="url(#arrowR)"/>
  <text x="448" y="625" font-size="9" fill="#888">auth middleware</text>

  <!-- ==================== EXTERNAL SYSTEMS (Right) ==================== -->

  <!-- Supabase -->
  <rect x="1010" y="130" width="200" height="80" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="1110" y="157" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Supabase</text>
  <text x="1110" y="175" text-anchor="middle" font-size="10" fill="#558B2F">PostgreSQL + Object Storage</text>
  <text x="1110" y="192" text-anchor="middle" font-size="9" fill="#777">users, rides, marketplace_items,</text>
  <text x="1110" y="203" text-anchor="middle" font-size="9" fill="#777">activities, messages, groups, points...</text>

  <!-- Google Maps -->
  <rect x="1010" y="270" width="200" height="55" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="1110" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Google Maps API</text>
  <text x="1110" y="313" text-anchor="middle" font-size="10" fill="#1976D2">Geocoding / Places Autocomplete</text>

  <!-- Resend -->
  <rect x="1010" y="385" width="200" height="55" rx="6" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
  <text x="1110" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#6A1B9A">Resend Email API</text>
  <text x="1110" y="428" text-anchor="middle" font-size="10" fill="#8E24AA">Verification / Notifications</text>

  <!-- WeChat API -->
  <rect x="1010" y="500" width="200" height="70" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="1110" y="525" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">WeChat API</text>
  <text x="1110" y="543" text-anchor="middle" font-size="10" fill="#2E7D32">Mini Program OAuth</text>
  <text x="1110" y="558" text-anchor="middle" font-size="10" fill="#2E7D32">Deep Link / Group Notices</text>

  <!-- Vercel -->
  <rect x="1010" y="640" width="200" height="44" rx="6" fill="#F5F5F5" stroke="#616161" stroke-width="1.5"/>
  <text x="1110" y="667" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">Vercel (CDN / Hosting)</text>

  <!-- Railway -->
  <rect x="1010" y="720" width="200" height="44" rx="6" fill="#F5F5F5" stroke="#616161" stroke-width="1.5"/>
  <text x="1110" y="747" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">Railway (Backend Hosting)</text>

  <!-- ==================== DATA FLOW LINES ==================== -->

  <!-- Student → Frontend -->
  <line x1="210" y1="122" x2="308" y2="160" stroke="#555" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="308" y1="180" x2="210" y2="122" stroke="#555" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="220" y="108" font-size="9" fill="#555">Browse / Post / Book / Chat</text>

  <!-- WeChat User → Frontend -->
  <line x1="210" y1="242" x2="308" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="222" y="232" font-size="9" fill="#555">H5 WebView Access</text>

  <!-- Admin → Backend -->
  <line x1="210" y1="762" x2="308" y2="762" stroke="#D4874E" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="215" y="752" font-size="9" fill="#D4874E">Moderation / Config / Announcements</text>

  <!-- Backend → Supabase -->
  <line x1="572" y1="400" x2="1008" y2="170" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrowBi)"/>
  <text x="760" y="250" font-size="10" fill="#4CAF50" font-weight="500">CRUD (all tables)</text>

  <!-- Backend → Google Maps -->
  <line x1="572" y1="430" x2="1008" y2="297" stroke="#1976D2" stroke-width="1.3" marker-end="url(#arrowR)"/>
  <text x="770" y="340" font-size="10" fill="#1976D2">Geocoding / Route Query</text>

  <!-- Backend → Resend -->
  <line x1="572" y1="460" x2="1008" y2="412" stroke="#8E24AA" stroke-width="1.3" marker-end="url(#arrowR)"/>
  <text x="770" y="420" font-size="10" fill="#8E24AA">Send Verification / Notifications</text>

  <!-- Backend → WeChat -->
  <line x1="572" y1="490" x2="1008" y2="530" stroke="#2E7D32" stroke-width="1.3" marker-end="url(#arrowR)"/>
  <text x="770" y="525" font-size="10" fill="#2E7D32">OAuth / Link Gen / Notices</text>

  <!-- Frontend → Vercel -->
  <line x1="572" y1="200" x2="1008" y2="660" stroke="#616161" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrowR)"/>
  <text x="850" y="610" font-size="9" fill="#999">deployed on</text>

  <!-- Backend → Railway -->
  <line x1="572" y1="500" x2="1008" y2="740" stroke="#616161" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrowR)"/>
  <text x="850" y="690" font-size="9" fill="#999">deployed on</text>

  <!-- Google Maps → Frontend (client-side) -->
  <line x1="1008" y1="280" x2="572" y2="180" stroke="#1976D2" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="760" y="210" font-size="9" fill="#1976D2">Places Autocomplete (client-side)</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="1010" y="810" width="360" height="90" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="1020" y="830" font-size="11" font-weight="700" fill="#555">Legend</text>
  <line x1="1020" y1="845" x2="1060" y2="845" stroke="#555" stroke-width="1.5"/>
  <text x="1068" y="849" font-size="10" fill="#666">Data flow</text>
  <line x1="1020" y1="865" x2="1060" y2="865" stroke="#555" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="1068" y="869" font-size="10" fill="#666">Deployment / hosting</text>
  <rect x="1020" y="878" width="40" height="14" rx="3" fill="#FFF8DC" stroke="#C8A84E" stroke-width="1"/>
  <text x="1068" y="889" font-size="10" fill="#666">Internal subsystem</text>
  <rect x="1180" y="838" width="40" height="14" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="1228" y="849" font-size="10" fill="#666">External service</text>
  <rect x="1180" y="858" width="40" height="14" rx="3" fill="#FFF8DC" stroke="#D4874E" stroke-width="1"/>
  <text x="1228" y="869" font-size="10" fill="#666">Actor</text>
  <rect x="1180" y="878" width="40" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1228" y="889" font-size="10" fill="#666">System boundary</text>
</svg>